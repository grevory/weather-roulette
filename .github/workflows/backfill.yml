name: Backfill Historical Data

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'How many days back to backfill (default: 90)'
        required: false
        default: '90'
      dry_run:
        description: 'Dry run — print what would be written without writing'
        required: false
        type: boolean
        default: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Backfill data
        run: |
          ARGS="--days ${{ github.event.inputs.days }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          npm run backfill -- $ARGS

      - name: Compute scores
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm run score

      - name: Commit backfilled data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/data/
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "chore: backfill ${{ github.event.inputs.days }} days of weather data [skip ci]"
            git push
          fi
