name: Capture Weather Forecast

on:
  schedule:
    # 06:00 UTC daily = 03:30 NST / 02:30 NDT — well before local forecast day changes
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Capture forecasts + observations
        run: npm run capture

      - name: Compute scores
        run: npm run score

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "chore: update weather data $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
